    <div id="game-container"></div>
    <script>
    // ============================================================
    // KONSTANTEN
    // ============================================================
    const TILE_W = 64;
    const TILE_H = 32;
    const MAP_SIZE = 24;
    const POOL_ENEMIES = 150;
    const POOL_PROJECTILES = 80;
    const POOL_XP = 200;
    const POOL_PARTICLES = 100;
    
    const COLORS = {
        grass: 0x2d5a3d,
        grassLight: 0x3d7a4d,
        stone: 0x6b6b7b,
        stoneLight: 0x7b7b8b,
        wall: 0x4a4a5a,
        wallTop: 0x5a5a6a,
        wallSide: 0x3a3a4a,
        player: 0x3b82f6,
        playerLight: 0x60a5fa,
        enemyTank: 0xef4444,
        enemyFast: 0xf59e0b,
        enemyRange: 0xa855f7,
        projectile: 0xffffff,
        xp: 0xfacc15,
        xpGlow: 0xfef08a,
        boss: 0xdc2626,
        health: 0x22c55e,
        healthBg: 0x374151,
        xpBar: 0x3b82f6,
        xpBarBg: 0x1e3a5f,
        uiText: 0xffffff,
        shadow: 0x000000
    };

    // ============================================================
    // ISOMETRIC MATH
    // ============================================================
    const IsoMath = {
        toIso(mx, my) {
            return {
                x: (mx - my) * (TILE_W / 2),
                y: (mx + my) * (TILE_H / 2)
            };
        },
        toMap(sx, sy) {
            return {
                x: (sx / (TILE_W / 2) + sy / (TILE_H / 2)) / 2,
                y: (sy / (TILE_H / 2) - sx / (TILE_W / 2)) / 2
            };
        },
        distance(a, b) {
            const dx = a.mx - b.mx;
            const dy = a.my - b.my;
            return Math.sqrt(dx * dx + dy * dy);
        },
        angle(a, b) {
            return Math.atan2(b.my - a.my, b.mx - a.mx);
        }
    };

    // ============================================================
    // UPGRADE DATA
    // ============================================================
    const UPGRADES = [
        { id: 'damage', name: 'Schaden +', desc: '+20% Schaden', icon: '⚔️', apply: (p) => { p.damageMult *= 1.2; } },
        { id: 'speed', name: 'Tempo +', desc: '+15% Bewegung', icon: '👟', apply: (p) => { p.speedMult *= 1.15; } },
        { id: 'area', name: 'Bereich +', desc: '+25% Reichweite', icon: '⭕', apply: (p) => { p.areaMult *= 1.25; } },
        { id: 'cooldown', name: 'Cooldown -', desc: '-15% Cooldown', icon: '⚡', apply: (p) => { p.cooldownMult *= 0.85; } },
        { id: 'multishot', name: 'Multi-Schuss', desc: '+1 Projektil', icon: '🔫', apply: (p) => { p.projectileCount += 1; } },
        { id: 'lifesteal', name: 'Lebensraub', desc: '+5% Heilung pro Kill', icon: '❤️', apply: (p) => { p.lifesteal += 0.05; } },
        { id: 'magnet', name: 'Magnet', desc: '+50% XP-Reichweite', icon: '🧲', apply: (p) => { p.magnetRange *= 1.5; } },
        { id: 'hp', name: 'Leben +', desc: '+30 Max HP', icon: '🛡️', apply: (p) => { p.maxHp += 30; p.hp += 30; } }
    ];

    // ============================================================
    // SPATIAL GRID
    // ============================================================
    class SpatialGrid {
        constructor(cellSize) {
            this.cellSize = cellSize;
            this.cells = new Map();
        }
        
        clear() {
            this.cells.clear();
        }
        
        insert(entity) {
            const cx = Math.floor(entity.mx / this.cellSize);
            const cy = Math.floor(entity.my / this.cellSize);
            const key = `${cx},${cy}`;
            if (!this.cells.has(key)) this.cells.set(key, []);
            this.cells.get(key).push(entity);
        }
        
        queryRange(mx, my, radius) {
            const results = [];
            const rCells = Math.ceil(radius / this.cellSize);
            const cx = Math.floor(mx / this.cellSize);
            const cy = Math.floor(my / this.cellSize);
            
            for (let dx = -rCells; dx <= rCells; dx++) {
                for (let dy = -rCells; dy <= rCells; dy++) {
                    const key = `${cx + dx},${cy + dy}`;
                    const cell = this.cells.get(key);
                    if (cell) {
                        for (const e of cell) {
                            if (IsoMath.distance({mx, my}, e) <= radius) {
                                results.push(e);
                            }
                        }
                    }
                }
            }
            return results;
        }
    }

    // ============================================================
    // ISO TILEMAP
    // ============================================================
    class IsoTilemap {
        constructor(scene) {
            this.scene = scene;
            this.tiles = [];
            this.walls = [];
            this.container = scene.add.container(0, 0);
            this.generate();
        }
        
        generate() {
            const offsetX = this.scene.cameras.main.width / 2;
            const offsetY = this.scene.cameras.main.height / 3;
            
            for (let x = 0; x < MAP_SIZE; x++) {
                this.tiles[x] = [];
                for (let y = 0; y < MAP_SIZE; y++) {
                    const type = Math.random() < 0.15 ? 'wall' : (Math.random() < 0.3 ? 'stone' : 'grass');
                    this.tiles[x][y] = type;
                    
                    const pos = IsoMath.toIso(x, y);
                    const screenX = pos.x + offsetX;
                    const screenY = pos.y + offsetY;
                    
                    // Boden
                    const color = type === 'grass' 
                        ? ((x + y) % 2 === 0 ? COLORS.grass : COLORS.grassLight)
                        : ((x + y) % 2 === 0 ? COLORS.stone : COLORS.stoneLight);
                    
                    const tile = this.scene.add.polygon(screenX, screenY, [
                        0, -TILE_H/2,
                        TILE_W/2, 0,
                        0, TILE_H/2,
                        -TILE_W/2, 0
                    ], color);
                    tile.setStrokeStyle(1, 0x1a1a2e, 0.3);
                    tile.setDepth(screenY);
                    this.container.add(tile);
                    
                    // Wand
                    if (type === 'wall') {
                        const wallH = 24;
                        const wallTop = this.scene.add.polygon(screenX, screenY - wallH, [
                            0, -TILE_H/2 - wallH,
                            TILE_W/2, -wallH,
                            0, TILE_H/2 - wallH,
                            -TILE_W/2, -wallH
                        ], COLORS.wallTop);
                        wallTop.setDepth(screenY - wallH + 1);
                        this.container.add(wallTop);
                        
                        const wallLeft = this.scene.add.polygon(screenX - TILE_W/4, screenY + TILE_H/4 - wallH/2, [
                            -TILE_W/2, -wallH,
                            0, -TILE_H/2 - wallH,
                            0, -TILE_H/2,
                            -TILE_W/2, 0
                        ], COLORS.wallSide);
                        wallLeft.setDepth(screenY + 1);
                        this.container.add(wallLeft);
                        
                        const wallRight = this.scene.add.polygon(screenX + TILE_W/4, screenY + TILE_H/4 - wallH/2, [
                            0, -TILE_H/2 - wallH,
                            TILE_W/2, -wallH,
                            TILE_W/2, 0,
                            0, -TILE_H/2
                        ], COLORS.wall);
                        wallRight.setDepth(screenY + 1);
                        this.container.add(wallRight);
                        
                        this.walls.push({ mx: x, my: y, screenX, screenY });
                    }
                }
            }
        }
        
        isWall(mx, my) {
            const ix = Math.floor(mx);
            const iy = Math.floor(my);
            if (ix < 0 || ix >= MAP_SIZE || iy < 0 || iy >= MAP_SIZE) return true;
            return this.tiles[ix][iy] === 'wall';
        }
        
        getValidSpawn() {
            let attempts = 0;
            while (attempts < 100) {
                const x = Math.floor(Math.random() * MAP_SIZE);
                const y = Math.floor(Math.random() * MAP_SIZE);
                if (this.tiles[x][y] !== 'wall') {
                    return { mx: x + 0.5, my: y + 0.5 };
                }
                attempts++;
            }
            return { mx: 5, my: 5 };
        }
    }

    // ============================================================
    // ENTITY POOL MANAGER
    // ============================================================
    class EntityPool {
        constructor(scene, maxSize, createFn) {
            this.scene = scene;
            this.maxSize = maxSize;
            this.createFn = createFn;
            this.pool = [];
            this.active = [];
            
            for (let i = 0; i < maxSize; i++) {
                const entity = createFn();
                entity.setVisible(false);
                entity.setActive(false);
                this.pool.push(entity);
            }
        }
        
        spawn(...args) {
            const entity = this.pool.find(e => !e.active);
            if (!entity) return null;
            entity.setActive(true);
            entity.setVisible(true);
            entity.reset(...args);
            this.active.push(entity);
            return entity;
        }
        
        despawn(entity) {
            entity.setActive(false);
            entity.setVisible(false);
            const idx = this.active.indexOf(entity);
            if (idx > -1) this.active.splice(idx, 1);
        }
        
        updateAll(dt, time) {
            for (let i = this.active.length - 1; i >= 0; i--) {
                const entity = this.active[i];
                if (!entity.update(dt, time)) {
                    this.despawn(entity);
                }
            }
        }
    }

    // ============================================================
    // PLAYER
    // ============================================================
    class Player extends Phaser.GameObjects.Container {
        constructor(scene, mx, my) {
            const pos = IsoMath.toIso(mx, my);
            const screenX = pos.x + scene.cameras.main.width / 2;
            const screenY = pos.y + scene.cameras.main.height / 3;
            
            super(scene, screenX, screenY);
            scene.add.existing(this);
            
            this.mx = mx;
            this.my = my;
            this.baseSpeed = 3.5;
            this.speedMult = 1;
            this.damageMult = 1;
            this.areaMult = 1;
            this.cooldownMult = 1;
            this.projectileCount = 1;
            this.lifesteal = 0;
            this.magnetRange = 3;
            this.maxHp = 100;
            this.hp = 100;
            this.xp = 0;
            this.xpToLevel = 50;
            this.level = 1;
            this.kills = 0;
            this.alive = true;
            
            // Shadow
            this.shadow = scene.add.ellipse(0, 8, 28, 12, COLORS.shadow, 0.4);
            this.add(this.shadow);
            
            // Body (diamond)
            this.body = scene.add.polygon(0, -4, [
                0, -16,
                14, -4,
                0, 8,
                -14, -4
            ], COLORS.player);
            this.add(this.body);
            
            // Highlight
            this.highlight = scene.add.polygon(0, -6, [
                0, -12,
                8, -4,
                0, 4,
                -8, -4
            ], COLORS.playerLight);
            this.add(this.highlight);
            
            // Weapon indicator
            this.weapon = scene.add.rectangle(12, -8, 4, 12, 0xffffff);
            this.weapon.setOrigin(0.5, 1);
            this.add(this.weapon);
            
            this.setDepth(screenY + 100);
            this.setSize(20, 20);
        }
        
        update(dt, input, tilemap) {
            if (!this.alive) return;
            
            // Movement
            let dx = 0, dy = 0;
            if (input.keys.w || input.keys.up) dy -= 1;
            if (input.keys.s || input.keys.down) dy += 1;
            if (input.keys.a || input.keys.left) dx -= 1;
            if (input.keys.d || input.keys.right) dx += 1;
            
            // Joystick
            if (input.joystick.active) {
                dx = input.joystick.x;
                dy = input.joystick.y;
            }
            
            // Normalize
            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx*dx + dy*dy);
                if (len > 1) { dx /= len; dy /= len; }
                
                const speed = this.baseSpeed * this.speedMult * dt * 0.06;
                const newMx = this.mx + dx * speed;
                const newMy = this.my + dy * speed;
                
                if (!tilemap.isWall(newMx, this.my)) this.mx = newMx;
                if (!tilemap.isWall(this.mx, newMy)) this.my = newMy;
                
                // Rotate weapon
                const angle = Math.atan2(dy, dx);
                this.weapon.setRotation(angle + Math.PI/2);
            }
            
            // Update screen position
            const pos = IsoMath.toIso(this.mx, this.my);
            const centerX = this.scene.cameras.main.width / 2;
            const centerY = this.scene.cameras.main.height / 3;
            this.x = pos.x + centerX;
            this.y = pos.y + centerY;
            this.setDepth(this.y + 100);
        }
        
        takeDamage(amount) {
            this.hp -= amount;
            if (this.hp <= 0) {
                this.hp = 0;
                this.alive = false;
            }
            // Flash red
            this.body.setFillStyle(0xff0000);
            this.scene.time.delayedCall(100, () => {
                this.body.setFillStyle(COLORS.player);
            });
        }
        
        heal(amount) {
            this.hp = Math.min(this.hp + amount, this.maxHp);
        }
        
        addXp(amount) {
            this.xp += amount;
            if (this.xp >= this.xpToLevel) {
                this.xp -= this.xpToLevel;
                this.level++;
                this.xpToLevel = Math.floor(this.xpToLevel * 1.3);
                return true; // Leveled up
            }
            return false;
        }
    }

    // ============================================================
    // ENEMY
    // ============================================================
    class Enemy extends Phaser.GameObjects.Container {
        constructor(scene) {
            super(scene, 0, 0);
            scene.add.existing(this);
            
            this.mx = 0;
            this.my = 0;
            this.hp = 10;
            this.maxHp = 10;
            this.speed = 1.5;
            this.damage = 5;
            this.xpValue = 5;
            this.type = 'tank';
            this.alive = true;
            this.pushX = 0;
            this.pushY = 0;
            
            // Shadow
            this.shadow = scene.add.ellipse(0, 8, 24, 10, COLORS.shadow, 0.4);
            this.add(this.shadow);
            
            // Body
            this.body = scene.add.polygon(0, -2, [
                0, -14,
                12, -2,
                0, 6,
                -12, -2
            ], COLORS.enemyTank);
            this.add(this.body);
            
            // Eyes
            this.eyeL = scene.add.circle(-4, -6, 2, 0xffffff);
            this.eyeR = scene.add.circle(4, -6, 2, 0xffffff);
            this.pupilL = scene.add.circle(-4, -6, 1, 0x000000);
            this.pupilR = scene.add.circle(4, -6, 1, 0x000000);
            this.add([this.eyeL, this.eyeR, this.pupilL, this.pupilR]);
            
            // HP bar bg
            this.hpBg = scene.add.rectangle(0, -20, 20, 3, COLORS.healthBg);
            this.add(this.hpBg);
            
            // HP bar
            this.hpBar = scene.add.rectangle(0, -20, 20, 3, COLORS.health);
            this.hpBar.setOrigin(0, 0.5);
            this.hpBar.x = -10;
            this.add(this.hpBar);
            
            this.setVisible(false);
            this.setActive(false);
        }
        
        reset(type, mx, my, waveMult) {
            this.mx = mx;
            this.my = my;
            this.type = type;
            this.alive = true;
            this.pushX = 0;
            this.pushY = 0;
            
            const centerX = this.scene.cameras.main.width / 2;
            const centerY = this.scene.cameras.main.height / 3;
            const pos = IsoMath.toIso(mx, my);
            this.x = pos.x + centerX;
            this.y = pos.y + centerY;
            
            // Configure by type
            switch(type) {
                case 'tank':
                    this.maxHp = Math.floor(25 * waveMult);
                    this.hp = this.maxHp;
                    this.speed = 1.2;
                    this.damage = 8;
                    this.xpValue = 8;
                    this.body.setFillStyle(COLORS.enemyTank);
                    this.setScale(1.2);
                    break;
                case 'fast':
                    this.maxHp = Math.floor(8 * waveMult);
                    this.hp = this.maxHp;
                    this.speed = 2.8;
                    this.damage = 4;
                    this.xpValue = 5;
                    this.body.setFillStyle(COLORS.enemyFast);
                    this.setScale(0.9);
                    break;
                case 'range':
                    this.maxHp = Math.floor(12 * waveMult);
                    this.hp = this.maxHp;
                    this.speed = 1.8;
                    this.damage = 6;
                    this.xpValue = 10;
                    this.body.setFillStyle(COLORS.enemyRange);
                    this.setScale(1.0);
                    break;
                case 'boss':
                    this.maxHp = Math.floor(200 * waveMult);
                    this.hp = this.maxHp;
                    this.speed = 0.8;
                    this.damage = 20;
                    this.xpValue = 100;
                    this.body.setFillStyle(COLORS.boss);
                    this.setScale(2.0);
                    break;
            }
            
            this.updateHpBar();
            this.setDepth(this.y);
            this.setVisible(true);
            this.setActive(true);
        }
        
        update(dt, player, tilemap, time) {
            if (!this.alive) return false;
            
            // Move toward player
            const angle = IsoMath.angle(this, player);
            const dist = IsoMath.distance(this, player);
            
            if (dist > 0.5) {
                const moveSpeed = this.speed * dt * 0.06;
                let dx = Math.cos(angle) * moveSpeed;
                let dy = Math.sin(angle) * moveSpeed;
                
                // Separation from other enemies
